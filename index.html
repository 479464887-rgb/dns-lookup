<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="DNS Lookup - DNS记录查询工具"><meta property="og:title" content="DNS Lookup"><title>DNS Lookup</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:900px;margin:0 auto;padding:24px}.search-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}.search-row input{flex:1;min-width:200px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:10px 16px;border-radius:8px;font-size:14px}.search-row input:focus{outline:none;border-color:#58a6ff}.search-row select{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:10px 16px;border-radius:8px;font-size:14px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.results{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}.results-header{background:#21262d;padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #30363d}.result-item{border-bottom:1px solid #30363d;padding:12px 16px}.result-item:last-child{border-bottom:none}.result-row{display:flex;gap:12px;font-family:monospace;font-size:13px;line-height:1.8;flex-wrap:wrap}.result-label{color:#58a6ff;min-width:60px}.result-value{color:#7ee787;word-break:break-all}.loading{padding:24px;text-align:center;color:#8b949e}.error{padding:16px;color:#f85149;font-size:13px}.examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.examples button{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:4px 12px;border-radius:16px;cursor:pointer;font-size:12px}.examples button:hover{color:#58a6ff}</style></head><body><header><h1>🌐 DNS Lookup</h1><div class="lang-switch"><button class="active" onclick="setLang('zh')">中文</button><button onclick="setLang('en')">EN</button></div></header><div class="container"><div class="search-row"><input type="text" id="domain" placeholder="输入域名, e.g. google.com" onkeydown="if(event.key==='Enter')lookup()"><select id="type"><option value="A">A (IPv4)</option><option value="AAAA">AAAA (IPv6)</option><option value="CNAME">CNAME</option><option value="MX">MX (邮件)</option><option value="NS">NS (域名服务器)</option><option value="TXT">TXT</option><option value="SOA">SOA</option><option value="PTR">PTR</option></select><button class="btn btn-primary" onclick="lookup()">🔍 查询</button></div><div class="examples"><button onclick="quickLookup('google.com','A')">google.com</button><button onclick="quickLookup('github.com','MX')">github.com MX</button><button onclick="quickLookup('cloudflare.com','NS')">cloudflare.com NS</button><button onclick="quickLookup('example.com','TXT')">example.com TXT</button></div><div class="results" id="results"><div style="padding:32px;text-align:center;color:#8b949e">输入域名开始查询 / Enter a domain to start</div></div></div><script>let lang='zh';function setLang(l){lang=l;document.querySelectorAll('.lang-switch button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='zh')||(i===1&&l==='en')))}function quickLookup(d,t){document.getElementById('domain').value=d;document.getElementById('type').value=t;lookup()}async function lookup(){const domain=document.getElementById('domain').value.trim();const type=document.getElementById('type').value;if(!domain){alert('请输入域名');return}document.getElementById('results').innerHTML='<div class="loading">⏳ 查询中...</div>';try{const resp=await fetch('https://dns.google/resolve?name='+encodeURIComponent(domain)+'&type='+type);if(!resp.ok)throw new Error('HTTP '+resp.status);const data=await resp.json();if(data.Answer){let html='<div class="results-header">'+domain+' — '+type+' 记录 ('+data.Answer.length+' 条)</div>';data.Answer.forEach(a=>{html+='<div class="result-item"><div class="result-row"><span class="result-label">名称:</span><span class="result-value">'+a.name+'</span></div><div class="result-row"><span class="result-label">类型:</span><span class="result-value">'+typeMap[a.type]||a.type+' ('+a.type+')</span></div><div class="result-row"><span class="result-label">TTL:</span><span class="result-value">'+a.TTL+'s</span></div><div class="result-row"><span class="result-label">值:</span><span class="result-value">'+a.data+'</span></div></div>'});document.getElementById('results').innerHTML=html}else if(data.Authority){let html='<div class="results-header">未找到 '+type+' 记录 (权威应答)</div>';data.Authority.forEach(a=>{html+='<div class="result-item"><div class="result-row"><span class="result-label">SOA:</span><span class="result-value">'+a.name+' → '+a.data+'</span></div></div>'});document.getElementById('results').innerHTML=html}else{document.getElementById('results').innerHTML='<div class="error">未找到记录 / No records found</div>'}}catch(e){document.getElementById('results').innerHTML='<div class="error">查询失败: '+e.message+'</div>'}}const typeMap={A:'IPv4地址',AAAA:'IPv6地址',CNAME:'别名',MX:'邮件服务器',NS:'域名服务器',TXT:'文本',SOA:'授权起始',PTR:'反向解析'};</script></body></html>
